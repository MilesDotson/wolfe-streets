<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wolfe Streets</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <main id="shell">
      <canvas id="game" width="1280" height="720" tabindex="0" aria-label="Wolfe Streets game canvas"></canvas>

      <section id="hud" aria-live="polite">
        <div class="brand">
          <span class="mark">W</span>
          <div>
            <strong>Wolfe Streets</strong>
            <small id="mode">On foot</small>
          </div>
        </div>
        <div class="stat"><span>Cash</span><strong id="cash">$0</strong></div>
        <div class="stat"><span>Heat</span><strong id="heat">0</strong></div>
        <div id="policeActivity" class="police-idle" title="Police activity" aria-label="Police activity">★</div>
        <div class="stat"><span>Rep</span><strong id="rep">0</strong></div>
        <div class="stat"><span>Lives</span><strong id="lives">5</strong></div>
        <div class="bar"><span id="healthBar"></span></div>
        <canvas id="map" width="160" height="160" aria-label="Mini map"></canvas>
      </section>

      <section id="mission">
        <strong id="missionTitle">Welcome to Wolfe City</strong>
        <p id="missionText">Reach the glowing marker to start your first job.</p>
      </section>

      <section id="controls">
        <kbd>WASD</kbd><span>Move / drive</span>
        <kbd>Shift</kbd><span>Sprint / boost</span>
        <kbd>E</kbd><span>Enter vehicle / interact</span>
        <kbd>Space</kbd><span>Handbrake</span>
        <kbd>M</kbd><span>Next job</span>
      </section>

      <section id="testPanel" class="hidden" aria-label="Simulation test panel"></section>
      <section id="mobileControls" aria-label="Mobile controls">
        <div id="joystick" aria-label="Move joystick">
          <span id="joystickKnob"></span>
        </div>
        <div id="mobileButtons">
          <button class="touch-button secondary" type="button" data-touch="mission" aria-label="Next job">M</button>
          <button class="touch-button primary" type="button" data-touch="interact" aria-label="Enter vehicle or interact">E</button>
          <button class="touch-button secondary" type="button" data-touch="brake" aria-label="Handbrake">B</button>
          <button class="touch-button primary" type="button" data-touch="boost" aria-label="Sprint or boost">↑</button>
        </div>
      </section>
      <button id="start" type="button">Start Game</button>
      <div id="toast"></div>
    </main>

    <script type="module" src="src/game.js?v=motorcycle-reference-1"></script>
  </body>
</html>
